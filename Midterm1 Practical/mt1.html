<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Basic Math Operations</title>
</head>
<body>
    <h2>Number Calculator</h2>
    
   
    <input type="number" id="num1" placeholder="Enter first number">
    <input type="number" id="num2" placeholder="Enter second number">
    <button onclick="performMath()">Calculate</button>

    
    <div id="result"></div>

    <script>
        function performMath() {
            // Retrieve values from the input fields
            const val1 = document.getElementById('num1').value;
            const val2 = document.getElementById('num2').value;

            
            const n1 = parseFloat(val1);
            const n2 = parseFloat(val2);

            
            if (isNaN(n1) || isNaN(n2)) {
                document.getElementById('result').innerHTML = "Please enter valid numbers.";
                return;
            }

            
            const sum = n1 + n2;
            const difference = n1 - n2;
            const product = n1 * n2;

            
            document.getElementById('result').innerHTML = `
                <p><strong>Sum:</strong> ${sum}</p>
                <p><strong>Difference:</strong> ${difference}</p>
                <p><strong>Product:</strong> ${product}</p>
            `;
        }
    </script>
</body>
</html>
