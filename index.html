<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Test</title>
    <style>
                table {
            border-collapse: collapse;
            width: 70%;
            margin: 20px auto;
            text-align: center;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
        }
        caption {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        th {
            background-color: #f2f2f2;
        }

    </style>
</head>
<body>
    <table>
        <caption>Annual Examination Result</caption>
         <tr>
        <th rowspan="2">Roll No</th>
        <th rowspan="2">Student Name</th>
        <th colspan="3">Marks Obtained</th>
        <th rowspan="2">Total</th>
        <th rowspan="2">Grade</th>
    </tr>
    <tr>
        <th>Maths</th>
        <th>Science</th>
        <th>English</th>
    </tr>
    
    <tr>
        <td>101</td>
        <td>Aarav</td>
        <td>85</td>
        <td>78</td>
        <td>88</td>
        <td>251</td>
        <td>A</td>
    </tr>
    
    <tr>
        <td>102</td>
        <td>Ayush</td>
        <td>90</td>
        <td>92</td>
        <td>84</td>
        <td>266</td>
        <td>A+</td>
    </tr>
    
   
    
    <tr>
        <td>103</td>
        <td>Vansh</td>

    </table>
</body>
</html>
